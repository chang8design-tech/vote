<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情緒共感工作坊同步系統</title>
    <style>
        /* 整體背景設定 */
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
            font-family: "微軟正黑體", "Microsoft JhengHei", sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }

        /* 內容容器 */
        .wrapper { width: 90%; max-width: 800px; text-align: center; }

        /* 標題樣式 */
        h1 { font-size: 1.2rem; color: #555; letter-spacing: 2px; margin-bottom: 20px; }

        /* 底圖容器 */
        .image-container {
            width: 100%;
            border: 2px solid #333;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        img#display-image {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 下方文字顯示區 */
        .status-row {
            display: flex;
            background: #1e1e1e;
            margin-top: -10px; /* 稍微與圖片重疊或緊貼 */
            padding: 20px 0;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            border: 2px solid #333;
            border-top: none;
        }

        .slot {
            flex: 1;
            border-right: 1px solid #333;
        }

        .slot:last-child { border-right: none; }

        .label {
            font-size: 14px;
            color: #666;
            display: block;
            margin-bottom: 8px;
        }

        .word {
            font-size: 26px;
            font-weight: bold;
            color: #FFD700; /* 亮黃色文字 */
            min-height: 36px;
            transition: all 0.5s ease;
        }

        /* 文字跳動動畫 */
        @keyframes pop {
            0% { transform: scale(1); color: #FFF; }
            50% { transform: scale(1.3); color: #FFD700; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <h1>REAL-TIME EMOTION SYNC</h1>

        <div class="image-container">
            <img src="hexagon_base.png" id="display-image" alt="Workshop Base">
        </div>

        <div class="status-row">
            <div class="slot"><span class="label">①</span><div id="text1" class="word">---</div></div>
            <div class="slot"><span class="label">②</span><div id="text2" class="word">---</div></div>
            <div class="slot"><span class="label">③</span><div id="text3" class="word">---</div></div>
            <div class="slot"><span class="label">④</span><div id="text4" class="word">---</div></div>
        </div>
    </div>

    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script>
        const ABLY_KEY = 'bHcXGQ.1E5LxA:MTgbAhdb5kDHqeL91xshPWSuAqZihv_SMGB0693bBZE';
        const ably = new Ably.Realtime(ABLY_KEY);
        const channel = ably.channels.get('workshop-sync');

        // 訂閱同步訊息
        channel.subscribe('update', (message) => {
            const data = message.data; 
            const target = document.getElementById('text' + data.index);
            if (target) {
                target.innerText = data.word;
                // 加入更新動畫
                target.style.animation = "none";
                setTimeout(() => {
                    target.style.animation = "pop 0.6s ease-out";
                }, 10);
            }
        });
    </script>
</body>
</html>
