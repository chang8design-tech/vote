<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情緒共感工作坊同步系統</title>
    <style>
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
            font-family: "微軟正黑體", sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }

        /* 主容器：設定為相對定位，讓裡面的文字可以絕對定位 */
        .image-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            border: 2px solid #333;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        img#display-image {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 文字標籤的通用樣式 */
        .emotion-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.6); /* 半透明黑底 */
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #FFD700;
            font-size: 2vw; /* 隨螢幕縮放字體 */
            font-weight: bold;
            min-width: 100px;
            text-align: center;
            backdrop-filter: blur(5px); /* 毛玻璃效果 */
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 定位四個角落 (距離邊緣 5%) */
        #pos1 { top: 5%; left: 5%; }    /* 左上 */
        #pos2 { bottom: 5%; left: 5%; } /* 左下 */
        #pos3 { top: 5%; right: 5%; }   /* 右上 */
        #pos4 { bottom: 5%; right: 5%; }/* 右下 */

        /* 標號小字 */
        .id-num {
            font-size: 0.8rem;
            color: #888;
            display: block;
            margin-bottom: 2px;
        }

        /* 動畫效果 */
        @keyframes highlight {
            0% { transform: scale(1); border-color: gold; box-shadow: 0 0 0px gold; }
            50% { transform: scale(1.2); border-color: white; box-shadow: 0 0 20px gold; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="hexagon_base.png" id="display-image" alt="Workshop Base">

        <div id="pos1" class="emotion-label"><span class="id-num">① 左上</span><div id="text1">---</div></div>
        <div id="pos2" class="emotion-label"><span class="id-num">② 左下</span><div id="text2">---</div></div>
        <div id="pos3" class="emotion-label"><span class="id-num">③ 右上</span><div id="text3">---</div></div>
        <div id="pos4" class="emotion-label"><span class="id-num">④ 右下</span><div id="text4">---</div></div>
    </div>

    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script>
        const ABLY_KEY = 'bHcXGQ.1E5LxA:MTgbAhdb5kDHqeL91xshPWSuAqZihv_SMGB0693bBZE';
        const ably = new Ably.Realtime(ABLY_KEY);
        const channel = ably.channels.get('workshop-sync');

        channel.subscribe('update', (message) => {
            const data = message.data; 
            const textElement = document.getElementById('text' + data.index);
            const boxElement = document.getElementById('pos' + data.index);
            
            if (textElement) {
                textElement.innerText = data.word;
                // 觸發外框動畫
                boxElement.style.animation = "none";
                setTimeout(() => {
                    boxElement.style.animation = "highlight 0.8s ease-out";
                }, 10);
            }
        });
    </script>
</body>
</html>
