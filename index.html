<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共感戰場 - 手機投票頁面</title>
    <!-- 引入 Ably SDK -->
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body {
            font-family: "微軟正黑體", sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .header-img {
            width: 100%;
            max-width: 350px;
            border: 3px solid #F1C40F;
            border-radius: 15px;
            margin-bottom: 10px;
        }
        /* 地圖容器，用於放置浮動文字 */
        .map-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 350px;
        }
        .team-selector {
            background: #333;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #555;
        }
        .team-selector select {
            padding: 10px;
            font-size: 1.1em;
            background: #121212;
            color: white;
            border: 1px solid #F1C40F;
            border-radius: 5px;
            width: 80%;
        }
        /* 讓文字浮動在圖片上 */
        .emotion-overlay {
            position: absolute;
            color: #FFFFFF;
            font-size: 1em;
            font-weight: bold;
            text-shadow: 2px 2px 5px #000, -2px -2px 5px #000, 2px -2px 5px #000, -2px 2px 5px #000;
            cursor: pointer;
            /* 增加感應範圍 */
            padding: 20px;
            min-width: 60px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
        }
        /* 觸碰感應時的視覺回饋 */
        .emotion-overlay:active {
            background: rgba(241, 196, 15, 0.4);
            transform: translate(-50%, -50%) scale(1.2) !important;
        }
        /* 微調座標：1-2 號往下移，3-4 號往上移 */
        #pos-0 { top: 28%; left: 22%; transform: translate(-50%, -50%); }
        #pos-1 { top: 28%; right: 22%; transform: translate(50%, -50%); }
        #pos-2 { bottom: 28%; left: 22%; transform: translate(-50%, 50%); }
        #pos-3 { bottom: 28%; right: 22%; transform: translate(50%, 50%); }

        .btn-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        button {
            padding: 20px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px #333;
        }
        button:active { transform: translateY(4px); box-shadow: 0 2px #111; }
        /* 禁用狀態的樣式：變灰色且不可點擊 */
        button:disabled {
            background-color: #555 !important;
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.6;
        }
        #confirm-btn {
            margin-top: 15px;
            padding: 10px 25px;
            background-color: #F1C40F;
            font-size: 1.1em;
        }
        .btn-1 { background-color: #FF5252; }
        .btn-2 { background-color: #FF9800; }
        .btn-3 { background-color: #4CAF50; }
        .btn-4 { background-color: #2196F3; }
        #status { margin-top: 30px; font-size: 0.8em; color: #555; }
    </style>
</head>
<body>
    <h2>🏆 共感戰場：即時投票</h2>
    
    <div class="map-container">
        <img src="hexagon_base.png" class="header-img" alt="戰場地圖" onerror="this.src='https://via.placeholder.com/350x350/333/F1C40F?text=Battlefield+Map'">
        <!-- 圖片上的浮動情緒文字 -->
        <div class="emotion-overlay" id="pos-0" onclick="sendVote('①')"></div>
        <div class="emotion-overlay" id="pos-1" onclick="sendVote('②')"></div>
        <div class="emotion-overlay" id="pos-2" onclick="sendVote('③')"></div>
        <div class="emotion-overlay" id="pos-3" onclick="sendVote('④')"></div>
    </div>

    <div class="team-selector">
        <div style="font-size: 0.9em; color: #aaa; margin-bottom: 8px;">第一步：填寫基本資料</div>
        <select id="team-id" onchange="checkForm()">
            <option value="" disabled selected>-- 請選擇您的隊伍 --</option>
            <option value="0">第 1 隊</option>
            <option value="1">第 2 隊</option>
            <option value="2">第 3 隊</option>
            <option value="3">第 4 隊</option>
            <option value="4">第 5 隊</option>
            <option value="5">第 6 隊</option>
        </select>
        <input type="text" id="student-id" placeholder="請填寫學號" oninput="checkForm()" style="padding: 10px; margin-top: 10px; width: 75%; border-radius: 5px; border: 1px solid #F1C40F; background: #121212; color: white;">
        <button id="confirm-btn" onclick="confirmInfo()" disabled>確定身分</button>
        <div id="info-status" style="margin-top: 10px; font-weight: bold;"></div>
    </div>

    <div class="btn-container">
        <button class="btn-1" onclick="sendVote('①')" id="btn-0" disabled>等待發送情緒抽籤</button>
        <button class="btn-2" onclick="sendVote('②')" id="btn-1" disabled>等待發送情緒抽籤</button>
        <button class="btn-3" onclick="sendVote('③')" id="btn-2" disabled>等待發送情緒抽籤</button>
        <button class="btn-4" onclick="sendVote('④')" id="btn-3" disabled>等待發送情緒抽籤</button>
    </div>

    <div id="status">正在同步戰場資訊...</div>

    <script>
        const ably = new Ably.Realtime('bHcXGQ.1E5LxA:MTgbAhdb5kDHqeL91xshPWSuAqZihv_SMGB0693bBZE');
        const channel = ably.channels.get('emotion-voting');
        let hasVoted = false;         // 紀錄當前回合是否已投票
        let emotionsReceived = false; // 新增：紀錄是否已收到情緒資料
        let currentEmotionsData = []; // 新增：儲存當前的情緒資料
        let identityConfirmed = false; // 身分是否已按下確定

        function checkForm() {
            const team = document.getElementById('team-id').value;
            const studentIdInput = document.getElementById('student-id');
            let studentId = studentIdInput.value.trim();
            const confirmBtn = document.getElementById('confirm-btn');

            // 檢查是否包含非數字字元
            if (studentId !== "" && !/^\d+$/.test(studentId)) {
                alert("學號格式錯誤：請只能輸入數字喔！");
                // 自動過濾掉非數字字元，避免學生卡死
                studentIdInput.value = studentId.replace(/\D/g, '');
                studentId = studentIdInput.value;
            }

            // 確定按鈕解鎖條件：隊伍已選且學號至少兩碼
            confirmBtn.disabled = !(team !== "" && studentId.length >= 2);
        }

        function confirmInfo() {
            const infoStatus = document.getElementById('info-status');
            identityConfirmed = true;
            // 鎖定「確定身分」按鈕
            const confirmBtn = document.getElementById('confirm-btn');
            if (confirmBtn) confirmBtn.disabled = true;
            
            if (!emotionsReceived) {
                infoStatus.innerText = "身分已確認！請等待新情緒抽籤...";
                infoStatus.style.color = "#F1C40F";
            } else {
                infoStatus.innerText = "身分已確認，可以答題！";
                infoStatus.style.color = "#4CAF50";
                enableVoteButtons();
            }
        }

        function enableVoteButtons() {
            // 解鎖條件：身分已確認、已收到情緒、且本回合尚未投票
            if (!identityConfirmed || !emotionsReceived || hasVoted) return;
            [0, 1, 2, 3].forEach(i => {
                const btn = document.getElementById(`btn-${i}`);
                if (btn) btn.disabled = false;
                
                // 同時解鎖地圖感應區
                const pos = document.getElementById(`pos-${i}`);
                if (pos) {
                    pos.style.pointerEvents = "auto";
                    pos.style.opacity = "1";
                }
            });
        }

        ably.connection.on('connected', () => { document.getElementById('status').innerText = '🟢 已連線至雲端戰場'; });
        
        channel.subscribe('update_labels', (msg) => {
            hasVoted = false;         // 新題目重置
            emotionsReceived = true;  // 已收到情緒資料
            const data = msg.data.data;
            currentEmotionsData = data; // 儲存情緒資料
            // 重置「確定身分」按鈕狀態，如果學生還沒確認過身分
            const confirmBtn = document.getElementById('confirm-btn');
            if (confirmBtn && !identityConfirmed) confirmBtn.disabled = false;

            
            data.forEach((item, i) => {
                // 更新按鈕文字
                const btn = document.getElementById(`btn-${i}`);
                if(btn) btn.innerText = `${["①","②","③","④"][i]} ${item.emotion}`;
                
                // 同步更新圖片上的浮動文字
                const pos = document.getElementById(`pos-${i}`);
                if(pos) pos.innerText = item.emotion;
            });

            // 如果身分已經確定過，自動嘗試解鎖按鈕
            if (identityConfirmed) {
                confirmInfo();
            } else {
                checkForm();
            }
        });

        function sendVote(choice, idx) {
            const team = document.getElementById('team-id').value;
            const studentId = document.getElementById('student-id').value;
            const infoStatus = document.getElementById('info-status');
            
            if (!team || !studentId.trim() || !identityConfirmed) {
                alert("請先完成身分確認！");
                return;
            }

            const payload = {
                choice: choice,
                team: parseInt(team),
                studentId: studentId
            };

            channel.publish('update', payload, (err) => { 
                if(!err) {
                    // 投票成功後僅標記狀態並鎖定按鈕，不再彈出 alert 或更改按鈕文字
                    hasVoted = true; 
                    [0, 1, 2, 3].forEach(i => {
                        const btn = document.getElementById(`btn-${i}`);
                        btn.disabled = true;
                        
                        // 投票後鎖定地圖感應區
                        const pos = document.getElementById(`pos-${i}`);
                        if (pos) {
                            pos.style.pointerEvents = "none";
                            pos.style.opacity = "0.5";
                        }
                    });
                }
            });
        }
    </script>
</body>
</html>
