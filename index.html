<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共感戰場 - 手機投票頁面</title>
    <!-- 引入 Ably SDK -->
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body {
            font-family: "微軟正黑體", sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .header-img {
            width: 100%;
            max-width: 350px;
            border: 3px solid #F1C40F;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .emotion-box {
            background: #252525;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            border-left: 5px solid #F1C40F;
        }
        .emotion-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .emotion-text { color: #F1C40F; font-size: 1.1em; font-weight: bold; }
        .btn-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        button {
            padding: 20px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px #333;
        }
        button:active { transform: translateY(4px); box-shadow: 0 2px #111; }
        .team-1 { background-color: #FF5252; }
        .team-2 { background-color: #FF9800; }
        .team-3 { background-color: #FFEB3B; color: #000; }
        .team-4 { background-color: #4CAF50; }
        .team-5 { background-color: #2196F3; }
        .team-6 { background-color: #9C27B0; }
        #status { margin-top: 30px; font-size: 0.8em; color: #555; }
    </style>
</head>
<body>
    <h2>🏆 共感戰場：即時投票</h2>
    
    <!-- 呈現主程式用的底圖 (請確保圖片與 index.html 放在同個資料夾) -->
    <img src="hexagon_base.png" class="header-img" alt="戰場地圖" onerror="this.src='https://via.placeholder.com/350x350/333/F1C40F?text=Battlefield+Map'">

    <div class="emotion-box">
        <div style="font-size: 0.9em; color: #aaa;">目前抽出的隱藏情緒：</div>
        <div id="emotion-list" class="emotion-grid">
            <div class="emotion-text">① 待出題</div>
            <div class="emotion-text">② 待出題</div>
            <div class="emotion-text">③ 待出題</div>
            <div class="emotion-text">④ 待出題</div>
            <div class="emotion-text">⑤ 待出題</div>
            <div class="emotion-text">⑥ 待出題</div>
        </div>
    </div>

    <div class="btn-container">
        <button class="team-1" onclick="sendVote('①')">第 1 隊</button>
        <button class="team-2" onclick="sendVote('②')">第 2 隊</button>
        <button class="team-3" onclick="sendVote('③')">第 3 隊</button>
        <button class="team-4" onclick="sendVote('④')">第 4 隊</button>
        <button class="team-5" onclick="sendVote('⑤')">第 5 隊</button>
        <button class="team-6" onclick="sendVote('⑥')">第 6 隊</button>
    </div>

    <div id="status">正在同步戰場資訊...</div>

    <script>
        const ably = new Ably.Realtime('bHcXGQ.1E5LxA:MTgbAhdb5kDHqeL91xshPWSuAqZihv_SMGB0693bBZE');
        const channel = ably.channels.get('emotion-voting');

        ably.connection.on('connected', () => { document.getElementById('status').innerText = '🟢 已連線至雲端戰場'; });

        channel.subscribe('update_labels', (msg) => {
            const list = document.getElementById('emotion-list');
            list.innerHTML = msg.data.data.map((item, i) => `<div class="emotion-text">${["①","②","③","④","⑤","⑥"][i]} ${item.emotion}</div>`).join('');
        });

        function sendVote(choice) {
            channel.publish('update', { choice: choice }, (err) => { if(!err) alert('投票成功！您的預測是：' + choice); });
        }
    </script>
</body>
</html>
