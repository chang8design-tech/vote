<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>情緒共感工作坊同步頁面</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: "微軟正黑體", sans-serif; text-align: center; }
        .image-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 800px; margin: 20px auto; }
        .item { border: 2px solid #333; padding: 10px; background: #222; border-radius: 8px; }
        img { width: 100%; height: auto; border-radius: 4px; }
        .emotion-text { margin-top: 10px; font-size: 28px; font-weight: bold; color: #FFD700; min-height: 40px; }
        .id-badge { background: #444; display: inline-block; padding: 2px 8px; border-radius: 50%; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h1>情緒共感即時同步</h1>
    <div class="image-grid">
        <div class="item"><div class="id-badge">①</div><img src="fig1.PNG"><div id="text1" class="emotion-text">等待中...</div></div>
        <div class="item"><div class="id-badge">②</div><img src="fig2.PNG"><div id="text2" class="emotion-text">等待中...</div></div>
        <div class="item"><div class="id-badge">③</div><img src="fig3.PNG"><div id="text3" class="emotion-text">等待中...</div></div>
        <div class="item"><div class="id-badge">④</div><img src="fig4.PNG"><div id="text4" class="emotion-text">等待中...</div></div>
    </div>

    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script>
        // 這裡直接使用你提供的 Key
        const ABLY_KEY = 'bHcXGQ.1E5LxA:MTgbAhdb5kDHqeL91xshPWSuAqZihv_SMGB0693bBZE';
        const ably = new Ably.Realtime(ABLY_KEY);
        const channel = ably.channels.get('workshop-sync');

        channel.subscribe('update', (message) => {
            const data = message.data; // 格式: { "index": 1, "word": "焦慮" }
            const target = document.getElementById('text' + data.index);
            if (target) {
                target.innerText = data.word;
                target.style.transition = "0.3s";
                target.style.transform = "scale(1.2)";
                setTimeout(() => { target.style.transform = "scale(1)"; }, 300);
            }
        });
    </script>
</body>
</html>
