<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>情緒共感即時同步</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: "微軟正黑體", sans-serif; text-align: center; margin: 0; padding: 20px; }
        
        /* 容器：固定寬度並居中 */
        .container { max-width: 800px; margin: auto; position: relative; }

        /* 主圖設定 */
        .main-image-wrapper { position: relative; width: 100%; border: 3px solid #333; border-radius: 12px; overflow: hidden; }
        img#main-bg { width: 100%; display: block; }

        /* 文字同步區域：排成一列在圖片下方 */
        .status-bar { 
            display: flex; 
            justify-content: space-around; 
            margin-top: 20px; 
            background: #222; 
            padding: 15px; 
            border-radius: 10px;
        }

        .slot { flex: 1; border-right: 1px solid #444; }
        .slot:last-child { border-right: none; }

        .id-badge { font-size: 18px; color: #888; display: block; margin-bottom: 5px; }
        .emotion-text { font-size: 24px; font-weight: bold; color: #FFD700; }
        
        h1 { color: #555; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>情緒共感即時同步</h1>
        
        <div class="main-image-wrapper">
            <img src="bg.png" id="main-bg" alt="工作坊底圖">
        </div>

        <div class="status-bar">
            <div class="slot"><span class="id-badge">①</span><div id="text1" class="emotion-text">---</div></div>
            <div class="slot"><span class="id-badge">②</span><div id="text2" class="emotion-text">---</div></div>
            <div class="slot"><span class="id-badge">③</span><div id="text3" class="emotion-text">---</div></div>
            <div class="slot"><span class="id-badge">④</span><div id="text4" class="emotion-text">---</div></div>
        </div>
    </div>

    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script>
        const ABLY_KEY = 'bHcXGQ.1E5LxA:MTgbAhdb5kDHqeL91xshPWSuAqZihv_SMGB0693bBZE';
        const ably = new Ably.Realtime(ABLY_KEY);
        const channel = ably.channels.get('workshop-sync');

        channel.subscribe('update', (message) => {
            const data = message.data; 
            const target = document.getElementById('text' + data.index);
            if (target) {
                target.innerText = data.word;
                // 更新時的特效
                target.style.color = "#FFF";
                setTimeout(() => { target.style.color = "#FFD700"; }, 500);
            }
        });
    </script>
</body>
</html>
