<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共感戰場 - 手機投票頁面</title>
    <!-- 引入 Ably SDK -->
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body {
            font-family: "微軟正黑體", sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .header-img {
            width: 100%;
            max-width: 350px;
            border: 3px solid #F1C40F;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .team-selector {
            background: #333;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #555;
        }
        .team-selector select {
            padding: 10px;
            font-size: 1.1em;
            background: #121212;
            color: white;
            border: 1px solid #F1C40F;
            border-radius: 5px;
            width: 80%;
        }
        .emotion-box {
            background: #252525;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            border-left: 5px solid #F1C40F;
        }
        .emotion-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .emotion-text { color: #F1C40F; font-size: 1.1em; font-weight: bold; }
        .btn-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        button {
            padding: 20px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px #333;
        }
        button:active { transform: translateY(4px); box-shadow: 0 2px #111; }
        .btn-1 { background-color: #FF5252; }
        .btn-2 { background-color: #FF9800; }
        .btn-3 { background-color: #4CAF50; }
        .btn-4 { background-color: #2196F3; }
        #status { margin-top: 30px; font-size: 0.8em; color: #555; }
    </style>
</head>
<body>
    <h2>🏆 共感戰場：即時投票</h2>
    
    <img src="hexagon_base.png" class="header-img" alt="戰場地圖" onerror="this.src='https://via.placeholder.com/350x350/333/F1C40F?text=Battlefield+Map'">

    <div class="team-selector">
        <div style="font-size: 0.9em; color: #aaa; margin-bottom: 8px;">第一步：選擇您的隊伍</div>
        <select id="team-id">
            <option value="0">第 1 隊</option>
            <option value="1">第 2 隊</option>
            <option value="2">第 3 隊</option>
            <option value="3">第 4 隊</option>
            <option value="4">第 5 隊</option>
            <option value="5">第 6 隊</option>
        </select>
        <input type="text" id="student-id" placeholder="請輸入學號 (選填)" style="padding: 10px; margin-top: 10px; width: 75%; border-radius: 5px; border: 1px solid #F1C40F; background: #121212; color: white;">
    </div>

    <div class="emotion-box">
        <div style="font-size: 0.9em; color: #aaa;">第二步：預測隱藏情緒</div>
        <div id="emotion-list" class="emotion-grid">
            <div class="emotion-text">① 等待老師抽籤...</div>
            <div class="emotion-text">② 等待老師抽籤...</div>
            <div class="emotion-text">③ 等待老師抽籤...</div>
            <div class="emotion-text">④ 等待老師抽籤...</div>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-1" onclick="sendVote('①')" id="btn-0">① 等待抽籤</button>
        <button class="btn-2" onclick="sendVote('②')" id="btn-1">② 等待抽籤</button>
        <button class="btn-3" onclick="sendVote('③')" id="btn-2">③ 等待抽籤</button>
        <button class="btn-4" onclick="sendVote('④')" id="btn-3">④ 等待抽籤</button>
    </div>

    <div id="status">正在同步戰場資訊...</div>

    <script>
        const ably = new Ably.Realtime('bHcXGQ.1E5LxA:MTgbAhdb5kDHqeL91xshPWSuAqZihv_SMGB0693bBZE');
        const channel = ably.channels.get('emotion-voting');

        ably.connection.on('connected', () => { document.getElementById('status').innerText = '🟢 已連線至雲端戰場'; });

        channel.subscribe('update_labels', (msg) => {
            const data = msg.data.data;
            const list = document.getElementById('emotion-list');
            list.innerHTML = data.map((item, i) => `<div class="emotion-text">${["①","②","③","④"][i]} ${item.emotion}</div>`).join('');
            
            data.forEach((item, i) => {
                const btn = document.getElementById(`btn-${i}`);
                if(btn) btn.innerText = `${["①","②","③","④"][i]} ${item.emotion}`;
            });
        });

        function sendVote(choice, idx) {
            const team = document.getElementById('team-id').value;
            const studentId = document.getElementById('student-id').value;
            
            if (!team) {
                alert("請先選擇您的隊伍！");
                return;
            }

            const payload = {
                choice: choice,
                team: parseInt(team),
                studentId: studentId
            };

            channel.publish('update', payload, (err) => { 
                if(!err) alert(`隊伍 ${parseInt(team)+1} 投票成功！預測：${choice}`); 
            });
        }
    </script>
</body>
</html>
